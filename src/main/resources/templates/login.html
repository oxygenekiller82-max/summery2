<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>Login Now</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/login_css.css}">
	
</head>

<body>
	
	<!--1-BURGER nav bar mobile -->
	<nav class="navbar navbar-expand-lg tactile-navbar sticky-top">
		<div class="container">
			
			<a class="navbar-brand fw-bold text-white" href="/">ShopFlow</a>
			<button class="navbar-toggler border-0 shadow-none" type="button"
				data-bs-toggle="collapse"
				data-bs-target="#navbarNav">
			  <span class="navbar-toggler-icon"></span>
			</button>
			
			<div class="collapse navbar-collapse" id ="navbarNav">
				<ul class="navbar-nav ms-auto text-center">
					
					<!--navbar optionsss idk-->
					<li class="nav-item">
						<a class="nav-link text-white-50" href="/">Shop</a>
					</li>
					<li class="nav-item">
						<a class="nav-link text-white-50" href="#">Cart</a>
					</li>
					<li class="nav-item">
						<a class="nav-link text-white fw-bold" href="/login">Login</a>
					</li>
				</ul>
			</div>
		</div>		
	</nav>
	
	<div class="container mt-5 ">
		<div class="row justify-content-center">
			<div class="col-12 col-md-6 col-lg-5">
				
				<div class="card tactile-card p-4 mt-5">
					<h3 class="text-center fw-cold mb-4">Welcome back</h3>
					
					<form id="loginForm" method="post">
						<div class="mb-3">
							<label class="form-label fw-semibold">Email</label> 
							<input type="email" class="form-control tactile-input" name="username" required>
						</div>
						
						<div class="mb-3">
								<label class="form-label fw-semibold">Password</label> 
								<input type="password" class="form-control tactile-input" name="password" required>
						</div>
						
						<!--NO THYMEALF BINDING RESULT! js manuala way omg...-->
						<p id="errorMessage" class="text-danger small text-center fw-bold" style="display: none;">
						        Invalid email or password. Please try again.
						 </p>
						
						<button type="submit" class="btn w-100 tactile-btn fw-bold py-2">Log in</button>

					</form>
					
					
					<div class="text-center mt-4">
					     <p class="mb-0 text-muted">New user ? <a href="/register" class="accent-link fw-bold">Create an account here</a></p>
					
					 </div>
					 
					 
				</div>

			</div>
		</div>
	</div>
	
	
	
	<script src="/js/auth-handler.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
