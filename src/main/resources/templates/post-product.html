<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopFlow - Post a Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script th:src="@{/js/auth-handler.js}"></script>
    <style>
        :root{
            --bg-indigo: rgb(157, 210, 208);
            --card-lavender: #FDFCF0;
            --accent-coral: #EFA6AD;
            --text-navy: #1A1A1A;
            --white-highlight: rgba(255, 255, 255, 0.9);
        }

        body{
            background: var(--bg-indigo) url("/img/motif.png") repeat fixed;
            color: var(--text-navy);
            font-family: 'Segoe UI',sans-serif;
        }

        .tactile-navbar{
            background-color: rgba(157, 210, 208, 0.8);
            border-bottom: 1.5px solid var(--white-highlight);
            padding-top: 1rem;
            backdrop-filter: blur(10px);
        }

        .nav-link:hover{
            color:var(--accent-coral) !important;
            transition: color 0.4s ease;
        }

        .tactile-card{
            background-color: var(--card-lavender);
            border:none;
            border-radius: 16px;
            box-shadow:
                inset 2px 2px 4px var(--white-highlight),
                8px 12px 24px rgba(22,29,76,0.4);
        }

        .tactile-input{
            background-color: #E2E5F2;
            border: none;
            border-radius: 10px;
            color: var(--text-navy);
            box-shadow: inset 3px 3px 6px rgba(22,29,76,0.1),
                        inset -2px -2px 4px var(--white-highlight);
            padding: 0.75rem 1rem;
        }

        .tactile-input:focus {
            outline: none;
            box-shadow: inset 3px 3px 6px rgba(22,29,76,0.1),
                        inset -2px -2px 4px var(--white-highlight),
                        0 0 0 3px rgba(239, 166, 173, 0.2);
            background-color: #D8DBE8;
        }

        .tactile-btn {
            background-color: var(--accent-coral);
            color: white;
            border: none;
            border-radius: 12px;
            box-shadow: 2px 4px 8px rgba(239, 166, 173, 0.4),
                  inset 1px 1px 2px rgba(255, 255, 255, 0.6);
            transition: all 0.8s ease;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
        }

        .tactile-btn:hover {
            background-color: #f1b3b9;
            color: white;
            transform: translateY(-2px);
        }

        .container-xl {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .form-section {
            margin-top: 2rem;
        }

        .form-section h4 {
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-navy);
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(239, 166, 173, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-navy);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .error-message {
            background-color: rgba(239, 166, 173, 0.2);
            color: var(--text-navy);
            padding: 0.75rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-coral);
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message {
            background-color: rgba(76, 175, 80, 0.2);
            color: var(--text-navy);
            padding: 0.75rem;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            margin-bottom: 1.5rem;
            display: none;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-navy);
            border: 2px solid var(--accent-coral);
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: var(--accent-coral);
            color: white;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .info-text {
            font-size: 0.9rem;
            color: rgba(26, 26, 26, 0.6);
            margin-top: 0.5rem;
        }

        .image-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .image-input-group input {
            flex: 1;
        }

        .image-input-group button {
            padding: 0.75rem 1rem;
            background-color: var(--accent-coral);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .categories-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .category-option {
            background-color: #E2E5F2;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .category-option:hover {
            border-color: var(--accent-coral);
        }

        .category-option.selected {
            background-color: var(--accent-coral);
            color: white;
            border-color: var(--accent-coral);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg tactile-navbar sticky-top">
        <div class="container-lg">
            <a class="navbar-brand" href="/">🛍️ ShopFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/catalog">Catalog</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container-xl my-5">
        
        <div class="tactile-card p-5">
            <h2 class="mb-4 fw-bold text-center">Post a Product</h2>
            <p class="text-center text-muted mb-4">Add a new item to your shop</p>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <!-- PRODUCT INFO SECTION -->
            <div class="form-section">
                <h4>Product Information</h4>
                
                <div class="form-group">
                    <label class="form-label">Product Name *</label>
                    <input type="text" id="productName" class="form-control tactile-input" placeholder="e.g. Galaxy S25">
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="productDesc" class="form-control tactile-input" placeholder="Describe your product..."></textarea>
                </div>
            </div>

            <!-- PRICING SECTION -->
            <div class="form-section">
                <h4>Pricing & Stock</h4>
                
                <div class="row g-2">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Price (DT) *</label>
                            <input type="number" id="productPrice" class="form-control tactile-input" placeholder="1200" step="0.01">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Promo Price (Optional)</label>
                            <input type="number" id="productPromoPrice" class="form-control tactile-input" placeholder="900" step="0.01">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Stock *</label>
                    <input type="number" id="productStock" class="form-control tactile-input" placeholder="10" min="1">
                </div>
            </div>

			<div class="form-section">
			    <h4>Product Variants</h4>
			    <p class="info-text">Add at least one (e.g., "Standard", "Red", "XL")</p>
			    <div id="variantInputs">
			        <div class="variant-row">
			            <input type="text" class="form-control tactile-input v-name" placeholder="Variant Name (e.g. Standard)" value="Standard">
			            <input type="number" class="form-control tactile-input v-stock" placeholder="Stock" value="10">
			        </div>
			    </div>
			    <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="addVariantInput()">+ Add Variant</button>
			</div>
			
            <!-- CATEGORIES SECTION -->
            <div class="form-section">
                <h4>Categories</h4>
                <p class="info-text">Click to select categories for your product</p>
                <div class="categories-list" id="categoriesList">
                    <!-- Loaded by JS -->
                </div>
            </div>

            <!-- IMAGES SECTION -->
            <div class="form-section">
                <h4>Product Images</h4>
                <p class="info-text">Add image URLs (one per row)</p>
                <div id="imageInputs">
                    <div class="image-input-group">
                        <input type="url" class="form-control tactile-input product-image-url" placeholder="https://example.com/image.jpg">
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="addImageInput()">+ Add Another Image</button>
            </div>

            <!-- BUTTONS -->
            <div class="btn-group">
                <button class="tactile-btn flex-grow-1" onclick="postProduct()">
                    Post Product
                </button>
                <button class="btn-secondary flex-grow-1" onclick="window.location.href='/'">
                    Cancel
                </button>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedCategories = [];

        // Check auth
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('access_token');
            
            if (!token) {
                window.location.href = '/login?redirect=/post-product';
                return;
            }

            await loadCategories();
        });

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const categories = await res.json();
                
                const container = document.getElementById('categoriesList');
                container.innerHTML = '';

                if (!Array.isArray(categories) || categories.length === 0) {
                    container.innerHTML = '<p class="text-muted">No categories available</p>';
                    return;
                }

                categories.forEach(cat => {
                    const chip = document.createElement('button');
                    chip.type = 'button';
                    chip.className = 'category-option';
                    chip.textContent = cat.nom;
                    chip.onclick = (e) => {
                        e.preventDefault();
                        toggleCategory(cat.id, chip);
                    };
                    container.appendChild(chip);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        function toggleCategory(catId, element) {
            if (selectedCategories.includes(catId)) {
                selectedCategories = selectedCategories.filter(id => id !== catId);
                element.classList.remove('selected');
            } else {
                selectedCategories.push(catId);
                element.classList.add('selected');
            }
        }

        function addImageInput() {
            const container = document.getElementById('imageInputs');
            const div = document.createElement('div');
            div.className = 'image-input-group';
            div.innerHTML = `<input type="url" class="form-control tactile-input product-image-url" placeholder="https://example.com/image.jpg">`;
            container.appendChild(div);
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
		
		function addVariantInput() {
		    const container = document.getElementById('variantInputs');
		    const div = document.createElement('div');
		    div.className = 'variant-row';
		    div.innerHTML = `
		        <input type="text" class="form-control tactile-input v-name" placeholder="Variant Name">
		        <input type="number" class="form-control tactile-input v-stock" placeholder="Stock">
		        <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">×</button>
		    `;
		    container.appendChild(div);
		}
		

		async function postProduct(event) { // Added event as a parameter
		    const name = document.getElementById('productName').value.trim();
		    const desc = document.getElementById('productDesc').value.trim();
		    const price = parseFloat(document.getElementById('productPrice').value);
		    const promoPrice = document.getElementById('productPromoPrice').value ? parseFloat(document.getElementById('productPromoPrice').value) : null;
		    const stock = parseInt(document.getElementById('productStock').value);

		    // 1. EXTRACT VARIANTS (The missing piece!)
		    const variantRows = document.querySelectorAll('.variant-row');
		    const variants = Array.from(variantRows).map(row => {
		        return {
		            nom: row.querySelector('.v-name').value || "Standard",
		            stock: parseInt(row.querySelector('.v-stock').value) || 0
		        };
		    });

		    // Validation
		    if (!name || isNaN(price) || isNaN(stock)) {
		        showError('Please fill in all required fields (Name, Price, Stock)');
		        return;
		    }

		    // Get images
		    const imageUrls = Array.from(document.querySelectorAll('.product-image-url'))
		        .map(input => input.value.trim())
		        .filter(url => url.length > 0);

		    const payload = {
		        nom: name,
		        description: desc,
		        prix: price,
		        prixPromo: promoPrice,
		        stock: stock,
		        categoryIds: selectedCategories,
		        images: imageUrls,
		        variants: variants // Now 'variants' actually exists!
		    };

		    // Use event.currentTarget or a specific ID if event.target is acting up
		    const btn = document.querySelector('button[onclick*="postProduct"]');
		    btn.disabled = true;
		    const originalContent = btn.innerHTML;
		    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Posting...';

		    try {
		        const res = await authorizedFetch('/api/products', {
		            method: 'POST',
		            body: JSON.stringify(payload)
		        });

		        if (res.ok) {
		            showSuccess('Product posted! Redirecting...');
		            setTimeout(() => { window.location.href = '/catalog'; }, 1500);
		        } else {
		            const error = await res.json().catch(() => ({}));
		            showError(error.errorMessage || 'Failed to post product.');
		            btn.disabled = false;
		            btn.innerHTML = originalContent;
		        }
		    } catch (error) {
		        console.error('Error:', error);
		        showError('Error connecting to server.');
		        btn.disabled = false;
		        btn.innerHTML = originalContent;
		    }
		}

        // AUTHORIZED FETCH
        async function authorizedFetch(url, options = {}) {
            const token = localStorage.getItem('access_token');
            const headers = {
                'Content-Type': 'application/json',
                ...(options.headers || {})
            };

            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            return fetch(url, {
                ...options,
                headers
            });
        }
    </script>

</body>

</html>
