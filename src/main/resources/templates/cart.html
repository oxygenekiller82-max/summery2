<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>My Cart | ShopFlow</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" th:href="@{/css/login_css.css}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script th:src="@{/js/auth-handler.js}"></script>
        <style>
            :root {
                --bg-indigo: rgb(157, 210, 208); /* Teal */
                --card-lavender: #FDFCF0;
                --accent-coral: #EFA6AD;
                --text-navy: #1A1A1A;
                --white-highlight: rgba(255, 255, 255, 0.9);
            }
    
            body { background-color: #f8f9fa; color: var(--text-navy); }
    
            .tactile-card {
                background: var(--card-lavender);
                border-radius: 20px;
                border: 1px solid var(--white-highlight);
            }
    
            .cart-item-img {
                width: 100px; height: 100px; object-fit: contain;
                border-radius: 12px; background: white;
            }
    
            .qty-btn {
                width: 30px; height: 30px; border-radius: 8px;
                border: 1px solid #ddd; background: white;
                display: flex; align-items: center; justify-content: center;
                transition: 0.2s;
            }
            .qty-btn:hover { background: var(--bg-indigo); }
    
            #cartStatus {
                position: fixed; top: 20px; right: 20px; min-width: 250px;
                padding: 1rem 1.5rem; border-radius: 12px; z-index: 1050;
                box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(8px);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                transform: translateX(120%);
            }
            #cartStatus.show { transform: translateX(0); }
            .status-success { background-color: var(--bg-indigo) !important; color: var(--text-navy); }
            .status-error { background-color: var(--accent-coral) !important; color: white; }
    
            .coupon-section {
                background: rgba(255,255,255,0.5); border-radius: 12px; padding: 15px;
            }
        </style>
    </head>

    <body>
        <nav class="navbar navbar-expand-lg tactile-navbar sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold text-white" href="/">ShopFlow</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link text-white-50" href="/home">Home</a></li>
						<li class="nav-item">
							<a class="nav-link text-white fw-bold" href="/catalog">Catalog</a>
						</li>
                        <li class="nav-item"><a class="nav-link text-white" href="/cart">Cart</a></li>
                        <li class="nav-item"><a class="nav-link text-white-50" href="/login">Profile</a></li>
						
						<li class="nav-item">
		
												
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container mt-5">
            <div id="cartStatus"></div>
            
            <h1 class="display-6 fw-bold mb-4">Shopping Cart</h1>
    
            <div class="row g-4">
                <div class="col-lg-8">
                    <div id="cartItemsContainer" class="tactile-card p-4 shadow-sm">
                        <div class="text-center py-5">
                            <div class="spinner-border text-teal" role="status"></div>
                            <!-- OH MY GOODNESS ! ADDING A SPINNER IS THAT EASY ???????-->
                            <p class="mt-2">Loading your cart...</p>
                        </div>
                    </div>
                </div>
    
                <div class="col-lg-4">
                    <div class="tactile-card p-4 shadow-sm sticky-top" style="top: 100px;">
                        <h4 class="fw-bold mb-4">Order Summary</h4>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span id="subtotal">0.00 DT</span>
                        </div>
                        
                        <div id="discountRow" class="d-flex justify-content-between mb-2 text-success d-none">
                            <span>Discount</span>
                            <span id="discountValue">-0.00 DT</span>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Shipping Fee</span>
                            <span>7.00 DT</span>
                        </div>
    
                        <div class="coupon-section my-4">
                            <label class="small fw-bold mb-2 d-block">Have a coupon?</label>
                            <div class="input-group">
                                <input type="text" id="couponInput" class="form-control border-0" placeholder="Code">
                                <button id="applyBtn" class="btn btn-dark btn-sm px-3" onclick="handleCoupon()">Apply</button>
                            </div>
                            <div id="activeCoupon" class="mt-2 small text-muted d-none">
                                Applied: <span class="badge bg-secondary" id="couponName"></span>
                                <button class="btn btn-link btn-sm text-danger p-0 ms-2" onclick="removeCoupon()">Remove</button>
                            </div>
                        </div>
    
                        <hr>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="h5 mb-0">Total</span>
                            <span id="totalPrice" class="h4 fw-bold mb-0" style="color: var(--accent-coral);">0.00 DT</span>
                        </div>
    
                        <button onclick="window.location.href='/checkout'" class="tactile-btn w-100 py-3 fw-bold">
                            Proceed to Checkout
                        </button>
						
                    </div>
                </div>
            </div>
        </div>


        <script th:inline="javascript">
			if (!localStorage.getItem('access_token')) {
			    window.location.href = '/login';
			}
			
            const statusDiv = document.getElementById('cartStatus');
    
            function showToast(message, type) {
                statusDiv.innerText = message;
                statusDiv.className = type === 'success' ? 'status-success' : 'status-error';
                statusDiv.classList.add('show');
                setTimeout(() => statusDiv.classList.remove('show'), 5000);
            }
    
            if (!localStorage.getItem('access_token')) {
                window.location.href = '/login';
            }
    
            async function fetchCart() {
                try {
                    const res = await authorizedFetch('/api/cart');
                    if (!res.ok) throw new Error("Could not load cart");
                    const cart = await res.json();
                    renderCart(cart);

                } catch (err) {
                    console.error(err);
                    document.getElementById('cartItemsContainer').innerHTML = `<p class="text-danger">Failed to load cart. Try again later.</p>`;
                }
            }
    
            function renderCart(cart) {
                const container = document.getElementById('cartItemsContainer');

                const shipping = 7.0;
                const subtotal = cart.totalCartPrice || 0;
                const discount = cart.discountAmount || 0;

                const finalTTC = subtotal - discount + shipping;

                if (!cart.items || cart.items.length === 0) {
                    container.innerHTML = `<div class="text-center py-5"><h3>Your cart is empty!</h3><a href="/catalog" class="btn btn-outline-dark mt-3">Go Shopping</a></div>`;
                    return;
                }
    
                container.innerHTML = cart.items.map(item => `
                    <div class="row align-items-center mb-4 pb-4 border-bottom g-3">
                        <div class="col-md-2 text-center">
                            <img src="${item.imageUrl || 'https://via.placeholder.com/100'}" class="cart-item-img" alt="Product">
                        </div>
                        <div class="col-md-5">
                            <h5 class="fw-bold mb-1">${item.productName}</h5>
                            <p class="text-muted small mb-0">Variant: ${item.variantName || 'Standard'}</p>
                            <p class="text-primary small mb-0">${item.unitPrice} DT / unit</p>
                        </div>
                        <div class="col-md-3">
                            <div class="d-flex align-items-center gap-2">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                <span class="fw-bold">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            </div>
                        </div>
                        <div class="col-md-2 text-end">
                            <p class="fw-bold mb-0">${item.subTotal} DT</p>
                            <button class="btn btn-sm text-danger p-0 small" onclick="deleteItem(${item.id})">Remove</button>
                        </div>
                    </div>
                `).join('');
    
                // Totals
                document.getElementById('subtotal').innerText = `${cart.totalCartPrice} DT`;
                document.getElementById('totalPrice').innerText = `${cart.finalPrice+shipping-cart.discountAmount} DT`;
                
                // Coupon logic
                if (cart.discountAmount > 0) {
                    document.getElementById('discountRow').classList.remove('d-none');
                    document.getElementById('discountValue').innerText = `-${cart.discountAmount} DT`;
                    document.getElementById('activeCoupon').classList.remove('d-none');
                    document.getElementById('couponName').innerText = cart.appliedCouponCode;
                } else {
                    document.getElementById('discountRow').classList.add('d-none');
                    document.getElementById('activeCoupon').classList.add('d-none');
                }
            }
    
            async function updateQuantity(itemId, newQty) {
                if (newQty < 1){
                    return;
                    }

                try {
                    const res = await authorizedFetch(`/api/cart/items/${itemId}`,
                    { method: 'PUT',
                      body:  JSON.stringify(newQty)

                    });

                    if (res.ok){ 
                        //fetchCart();
                        const updatedCartData = await res.json(); 
                        renderCart(updatedCartData);
                    }

                    else {
                        const errorData = await res.json().catch(() => ({}));
                        const msg = errorData.errorMessage || "Could not update quantity. Try again later.";
                        console.log(msg); //REMOVE LATER I WILL FORGET THIS anr't i..
                        showToast("an Unexpcted Error Occured, Please Try again Later",  "error");
                    }
                } catch (err) {
                     console.error(err);
                     showToast("Connection error", "error");
                     }
            }
    
            async function deleteItem(itemId) {
                if (!confirm("Remove this item?")) return;
                try {
                    const res = await authorizedFetch(`/api/cart/items/${itemId}`, { method: 'DELETE' });
                    if (res.ok) {
                        showToast("Item removed", "success");
                        fetchCart();
                    }
                } catch (err) { console.error(err); }
            }
    
            async function handleCoupon() {
                const codeInput = document.getElementById('couponInput');
                const code = codeInput.value.trim();
                if (!code) return;

                try {
                    const res = await authorizedFetch('/api/cart/coupon', {
                        method: 'POST',
                        body: JSON.stringify({ code: code })
                    });

                    if (res.ok) {
                        const discountedCart = await res.json();
                        showToast("Coupon applied!", "success");
                         // render cart to see coupon applied
                         codeInput.value = "";
                         renderCart(discountedCart);
                        

                    } else {
                        const error = await res.json();
                        console.log(error);
                        showToast("Error while applying coupon.", "error");
                    }
                } catch (err) { console.log(err); }
            }
    
            async function removeCoupon() {
                try {
                    const res = await authorizedFetch('/api/cart/coupon', { method: 'DELETE' });
                    if (res.ok) {
                        showToast("Coupon removed", "success");
                        fetchCart();
                    }
                } catch (err) { console.error(err); }
            }
    
            
            fetchCart();
    
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
