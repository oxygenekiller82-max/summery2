<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Le Catalogue</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <link rel="stylesheet" th:href="@{/css/login_css.css}">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	

	
	<script th:src="@{/js/auth-handler.js}"></script>
</head>
<body>

	
	<!--1-BURGER nav bar mobile -->
		<nav class="navbar navbar-expand-lg tactile-navbar sticky-top">
			<div class="container">
				
				<a class="navbar-brand fw-bold text-white" href="/">ShopFlow</a>
				<button class="navbar-toggler border-0 shadow-none" type="button"
					data-bs-toggle="collapse"
					data-bs-target="#navbarNav">
				  <span class="navbar-toggler-icon"></span>
				</button>
				
				<div class="collapse navbar-collapse" id ="navbarNav">
					<ul class="navbar-nav ms-auto text-center">
						
						<!--navbar optionsss idk-->
						<li class="nav-item">
							<a class="nav-link text-white-50" href="/home">Home</a>
						</li>
						<li class="nav-item">
							<a class="nav-link text-white-50" href="/cart">Cart</a>
						</li>
						<li class="nav-item">
							<a class="nav-link text-white " href="/login">Login</a>
						</li>
						<!--catalog link-->
						<li class="nav-item">
							<a class="nav-link text-white fw-bold" href="/catalog">Catalog</a>
						</li>
					</ul>
				</div>
			</div>		
		</nav>
		

    <div class="container-fluid px-4 mt-4"> 
		<!--left = fitler, right = bigger + GRID-->
        <div class="row g-4 align-items-stretch catalog-row">
            <aside class="col-md-3 col-lg-3 mb-4">
                <div class="tactile-card p-4 h-100 d-flex flex-column shadow-sm">
                    <h5 class="mb-3">Tweak filters</h5>
					<hr>
                    <form th:action="@{/shop}" method="get" class="flex-grow-1">
						
                        <label class="small fw-bold">Category</label>
						
                        <select name="categoryName" class="tactile-input w-100 mb-3">
							
                            <option value="">Toutes</option>
							<!--get all categories -> each ${categories}-->
							
                            <option th:each="cat : ${categories}" 
                                    th:value="${cat.nom}" 
                                    th:text="${cat.nom}">
							</option>
									
                        </select>
                        
                        <label class="small fw-bold">Prix Max</label>
                        <input type="number" name="maxPrice" class="tactile-input w-100 mb-4" placeholder="DT">
						
						<!--Min note??-->
						<label class="small fw-bold">Note Minimale (0-5)</label>
						<input type="number" name="minNote" id="noteInput" 
						       class="tactile-input w-100 mb-3" 
						       min="0" max="5" step="0.5" placeholder="3.0">
                        
                        <button type="submit" class="tactile-btn w-100 py-2">Filtrer</button>
                    </form>
					
                </div>
            </aside>

			<!--GRID-->

            <main class="col-md-8 col-lg-9">
                <div class="tactile-card p-4 h-100 d-flex flex-column shadow-sm">
					
					<div class="mb-4">
					      <input type="text" id="searchInput" class="tactile-input w-100" placeholder="Rechercher un produit: ">
					 </div>
					
					 <div class="row g-4" id="productGrid">
						
					  </div>
                </div>

				<!--grid = row -> column i guess ? then forEach product -> div-->
       
            </main>
        </div>
    </div>
	
	<script th:src="@{/js/DynamicFilterProducts.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
