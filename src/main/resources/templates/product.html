<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <title>Produit | ShopFlow</title>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" th:href="@{/css/login_css.css}">
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	    <script th:src="@{/js/auth-handler.js}"></script>
	    <style>
	        .main-img { 
	            width: 100%; height: 400px; object-fit: contain; 
	            border-radius: 15px; background: #fff;
	        }
	        .thumb-img { 
	            width: 70px; height: 70px; object-fit: cover; 
	            cursor: pointer; border-radius: 8px; border: 2px solid transparent;
	        }
	        .thumb-img.active { border-color: #007bff; }
	        .variant-pill { cursor: pointer; transition: 0.2s; }
	        .variant-pill.selected { background-color: #007bff !important; color: white !important; }
			
			#cartStatus {
			    position: fixed;
			    top: 20px;
			    right: 20px;
			    min-width: 250px;
			    padding: 1rem 1.5rem;
			    border-radius: 12px;
			    z-index: 1050;
			    font-weight: 500;
			    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
			    backdrop-filter: blur(8px); 
			    border: 1px solid var(--white-highlight);
			    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			    transform: translateX(120%); 
			}
			#cartStatus.show {
			    transform: translateX(0); 
			}

			
			.status-success {
			    background-color: var(--bg-indigo) !important;
			    color: var(--text-navy);
			}

			.status-error {
			    background-color: var(--accent-coral) !important;
			    color: white;
			}
			
	    </style>
	</head>
	
	<body>
		<!--nav bar ofc..-->
		<nav class="navbar navbar-expand-lg tactile-navbar sticky-top">
		        <div class="container">
		            <a class="navbar-brand fw-bold text-white" href="/">ShopFlow</a>
		            <div class="collapse navbar-collapse" id="navbarNav">
		                <ul class="navbar-nav ms-auto">
		                    <li class="nav-item"><a class="nav-link text-white-50" href="/catalog">Catalog</a></li>
		                    <li class="nav-item"><a class="nav-link text-white-50" href="/cart">Cart</a></li>
							<li class="nav-item"><a class="nav-link text-white-50" href="/login">Cart</a></li>
							<li class="nav-item"><a class="nav-link text-white-50" th:href="@{/catalog}">Catalog</a></li>
							<li class="nav-item"><a class="nav-link text-white" th:href="@{/cart}">Cart</a></li>
		                </ul>
						
		            </div>
		        </div>
		    </nav>
			
			
			<div class="container mt-5">
			        <div class="row g-5">
			            <div class="col-md-6">
			                <div class="tactile-card p-3 shadow-sm text-center">
			                    <img id="mainImage" src="" class="main-img mb-3" alt="Product Image">
			                    <div id="thumbContainer" class="d-flex gap-2 justify-content-center">
			                        </div>
			                </div>
			            </div>

			            <div class="col-md-6">
			                <div class="tactile-card p-4 h-100 shadow-sm">
			                    <h1 id="productName" class="display-6 fw-bold">Loading...</h1>
			                    <p id="productCategory" class="text-muted small mb-2"></p>
			                    
			                    <div class="d-flex align-items-center mb-4">
			                        <h2 id="productPrice" class="text-primary fw-bold mb-0">--.-- DT</h2>
			                        <span id="promoBadge" class="badge bg-danger ms-3 d-none">DEAL</span>
			                    </div>

			                    <p id="productDesc" class="text-secondary mb-4"></p>

			                    <hr>

			                    <div class="mb-4">
			                        <label class="fw-bold small d-block mb-2">Choose a variant</label>
			                        <div id="variantContainer" class="d-flex gap-2 flex-wrap">
			                            </div>
			                    </div>

			                    <div class="row g-3 align-items-end">
			                        <div class="col-4">
			                            <label class="fw-bold small">Quantity</label>
			                            <input type="number" id="qtyInput" class="tactile-input w-100" value="1" min="1">
			                        </div>
			                        <div class="col-8">
			                            <button id="addBtn" class="tactile-btn w-100 py-2">Add to cart</button>

										<a th:href="@{/cart}" class="btn w-100 py-2" 
           									style="border: 2px solid var(--bg-indigo); color: var(--text-navy); border-radius: 12px; font-weight: 600; transition: 0.3s;">
           											View My Cart 
        								</a>

										<div id="cartStatus" ></div>
			                        </div>


			                    </div>
			                    
			                    <p id="stockStatus" class="mt-3 small text-muted"></p>
			                </div>
			            </div>
			        </div>

			        <div class="row mt-5">
			            <div class="col-12">
			                <div class="tactile-card p-4 shadow-sm">
			                    <h4 class="mb-4">User Reviews</h4>
			                    <div id="reviewsContainer">
			                        </div>
			                </div>
			            </div>
			        </div>
			    </div>
				
				<script th:inline="javascript">
					
					const statusDiv = document.getElementById('cartStatus');
					//status function 
					function showToast(message, type) {
					    statusDiv.innerText = message;
					    
					 
					    statusDiv.className = type === 'success' ? 'status-success' : 'status-error';
					    
					    // Add the "show" class-> ttrigger the CSS transition
					    statusDiv.classList.add('show');

					    // Auto-hide after 5 seconds
					    setTimeout(() => {
					        statusDiv.classList.remove('show');
					    }, 5000);
					}
					
					if (!localStorage.getItem('access_token')) {
					    window.location.href = '/login';
					}
					
					//URL is like /product/1 
					//so.. we need product id -> SPLIT -> POP
					let productId = window.location.pathname.split('/').pop();
					let selectedVariantId = null;
					
					async function initProductPage(){
						try{
						//authorized fetch for the rescue
						const res = await authorizedFetch(`/api/products/${productId}`); 
							
						if (!res.ok) throw new Error("Product not found");
						const product = await res.json();
						
						//Inceting innerHtml or innerText more scure 
						document.getElementById('productName').innerText = product.nom;
						document.getElementById('productDesc').innerText = product.description;
						document.getElementById('productPrice').innerText = `${product.prix} DT`;
						document.getElementById('productCategory').innerText = product.categories.map(c => c.nom).join(', ');
						document.getElementById('stockStatus').innerText = `Stock Available: ${product.stock}`;
						
						//prpduct images.. we have an array of images ofc..
						//can we.. create an img tag for each img ?? 
						//OOOH
						if (product.images && product.images.length > 0) {
						                    const mainImg = document.getElementById('mainImage');
						                    mainImg.src = product.images; //first img
											
						product.images.forEach((imgUrl, index) => {
						                        const thumb = document.createElement('img');
						                        thumb.src = imgUrl;
						                        thumb.className = `thumb-img ${index === 0 ? 'active' : ''}`;
						                        thumb.onclick = () => {
						                            mainImg.src = imgUrl;
						                            document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
						                            thumb.classList.add('active');
						                        };
						                        document.getElementById('thumbContainer').appendChild(thumb);
						                    });
										
					}
					
					//variants... 
					let variantDiv = document.getElementById('variantContainer');
					
					product.variants.forEach(v => {
					                    const pill = document.createElement('span');
					                    pill.className = 'badge rounded-pill bg-light text-dark p-2 px-3 border variant-pill';
					                    pill.innerText = v.nom;
					                    pill.onclick = () => {
					                        selectedVariantId = v.id;
					                        document.querySelectorAll('.variant-pill').forEach(p => p.classList.remove('selected'));
					                        pill.classList.add('selected');
					                        // Update price if variant has custom price ??? WAIT..
					                        if(v.prix) document.getElementById('productPrice').innerText = `${v.prix} DT`;
					                    };
					                    variantDiv.appendChild(pill);
					   });
					   
					   //reviews part :
					   
					   const reviewDiv = document.getElementById('reviewsContainer');
					                   if (product.reviews && product.reviews.length > 0) {
					                       product.reviews.forEach(r => {
					                           reviewDiv.innerHTML += `
					                               <div class="border-bottom mb-3 pb-2">
					                                   <div class="text-warning small">${'★'.repeat(r.note)}${'☆'.repeat(5-r.note)}</div>
					                                   <p class="mb-1">${r.commentaire}</p>
					                                   <small class="text-muted">Par ${r.customerName}</small>
					                               </div>`;
					                       });
										}else{
											reviewDiv.innerHTML = '<p class="text-muted">Be the first to review!.</p>';
										}
										
										//adding to cart 
										document.getElementById('addBtn').onclick = async () => {
										const qtyVal = document.getElementById('qtyInput').value;
										const qty = parseInt(qtyVal) || 1;
										
										
										console.log("FINAL CHECK:", { productId, selectedVariantId, qty });
										
										
										
										//const payload = { 
											//productId: parseInt(product.id), 
											//variantId: selectedVariantId || null, //WHY DOES UNEDIFNED EXIST IN JS ? 
											//quantity: parseInt(qty) 
										//};

										try {
											const res = await authorizedFetch('/api/cart/items', {
												method: 'POST',
												body: JSON.stringify({
													productId: parseInt(productId), 
													variantId: selectedVariantId || null, 
													quantity: parseInt(qty)
												})
											});
											
											//status div
											

											if (res.ok) {

													showToast("Added to cart! ", 'success');
													
											} else {

												//erros
												const errorData = await res.json().catch(() => ({}));
												console.error("Spring Error Detail:", errorData);
												
												const msg = errorData.errorMessage || "Stock Insufficient !";
												
												showToast(msg, 'error');
											}

											// (5secs
											setTimeout(() => {
												statusDiv.classList.add('d-none');
											}, 5000);

										} catch (err) {
											console.error("Cart Fetch Error:", err);
										}
									};
										
									}catch(err){
										console.error(err);
										 document.body.innerHTML = '<div class="container mt-5 text-center"><h1>404 Product cannot be found :( </h1></div>';
									}
								}
								
								initProductPage();
								
								

				</script>
				<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
				
			

	</body>
</html>
